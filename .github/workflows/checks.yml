name: Code checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint -- --cache

      - name: Build
        run: npm run build

      - name: Lighthouse CI
        run: npx lhci autorun